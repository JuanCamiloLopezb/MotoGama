{% extends 'base.html' %}
{% block title %}{{ titulo }} — MotoGama Elite{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <div class="page-title">{{ titulo.upper() }}</div>
        <div class="page-subtitle">Clientes / {{ titulo }}</div>
    </div>
    <a href="{{ url_for('clientes') }}" class="btn btn-secondary">← Volver</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="nombre">Nombre Completo *</label>
                <input type="text" id="nombre" name="nombre" required
                       value="{{ cliente.nombre if cliente else '' }}"
                       placeholder="Ej: Carlos Rodríguez">
            </div>
            <div class="form-group">
                <label for="documento">Documento de Identidad *</label>
                <input type="text" id="documento" name="documento" required
                       value="{{ cliente.documento if cliente else '' }}"
                       placeholder="Ej: 1234567890">
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" name="telefono" required
                       value="{{ cliente.telefono if cliente else '' }}"
                       placeholder="Ej: 3001234567">
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email"
                       value="{{ cliente.email if cliente else '' }}"
                       placeholder="Ej: cliente@email.com">
            </div>
            <div class="form-group">
                <label for="direccion">Dirección</label>
                <input type="text" id="direccion" name="direccion"
                       value="{{ cliente.direccion if cliente else '' }}"
                       placeholder="Ej: Bogotá, Chapinero">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                {{ '✓ Guardar Cambios' if cliente else '+ Registrar Cliente' }}
            </button>
            <a href="{{ url_for('clientes') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
